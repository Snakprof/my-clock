<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Clock - Snooze & Custom Tones</title>
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>

  <style>
    :root {
      --vanilla-latte: #f3e5ab;
      --accent-blue: #2a7fff;
    }

    body {
      margin: 0; padding: 0;
      background-color: #0a0a0a;
      color: #fff;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .clock-container { position: relative; width: 100vmin; height: 100vmin; }

    /* أرقام الساعة */
    .clock-numbers {
      position: absolute; top: 50%; left: 50%;
      width: 28vmin; height: 28vmin;
      transform: translate(-50%, -50%); z-index: 45;
    }

    .hour-num {
      position: absolute; width: 100%; height: 100%;
      text-align: center; font-weight: bold; font-size: 2.5vmin;
      color: rgba(255,255,255,0.6);
    }

    /* الحلقات والعقارب */
    .ring-wrapper { position: absolute; top: 50%; left: 50%; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    #ring-date { width: 88vmin; height: 88vmin; }
    #ring-month { width: 72vmin; height: 72vmin; }
    
    .analog-clock {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 32vmin; height: 32vmin;
      border-radius: 50%; background: #141414;
      box-shadow: inset 0 0 20px #000; z-index: 40;
    }

    #ampm-indicator {
      position: absolute; top: 65%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.2vmin; font-weight: bold;
      color: var(--vanilla-latte); text-shadow: 0 0 10px rgba(243, 229, 171, 0.5);
    }

    .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: 50% 100%; border-radius: 5vmin; background: #fff; }
    .hour-hand { width: 1.2vmin; height: 7.5vmin; margin-left: -0.6vmin; }
    .minute-hand { width: 0.8vmin; height: 11vmin; margin-left: -0.4vmin; }
    .second-hand { width: 0.3vmin; height: 13vmin; margin-left: -0.15vmin; background: #ff2a2a; }

    /* التحكم والمنبه */
    .controls { position: absolute; bottom: 5vmin; right: 5vmin; z-index: 100; }
    .btn-circle {
      width: 12vmin; height: 12vmin; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: white; font-size: 6vmin; cursor: pointer; backdrop-filter: blur(5px);
    }

    .modal {
      display: none; position: fixed; z-index: 200;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); justify-content: center; align-items: center;
      backdrop-filter: blur(10px);
    }
    .modal-content {
      background: #1a1a1a; padding: 25px; border-radius: 20px;
      width: 85%; max-width: 400px; border: 1px solid var(--vanilla-latte);
    }

    input, select {
      width: 100%; padding: 12px; margin: 10px 0;
      background: #222; border: 1px solid #444; color: #fff; border-radius: 8px;
    }

    .alarm-list { margin-top: 20px; max-height: 150px; overflow-y: auto; }
    .alarm-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px; background: #252525; margin-bottom: 8px; border-radius: 8px;
    }

    /* واجهة الرنين */
    #ringing-ui {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 300;
      flex-direction: column; justify-content: center; align-items: center;
    }
    .ring-btn {
      width: 80%; max-width: 250px; padding: 20px; margin: 10px;
      border: none; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
    }
    .stop-btn { background: #ff4444; color: white; }
    .snooze-btn { background: var(--vanilla-latte); color: #333; }
  </style>
</head>
<body>

  <div class="clock-container">
    <div class="clock-numbers" id="numbers-container"></div>
    <div class="analog-clock">
      <div id="ampm-indicator">AM</div>
      <div class="hand hour-hand" id="hour"></div>
      <div class="hand minute-hand" id="minute"></div>
      <div class="hand second-hand" id="second"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-circle" onclick="toggleModal('alarm-modal')">⏰</button>
  </div>

  <div id="ringing-ui">
    <h1 style="color:var(--vanilla-latte); font-size: 3rem; margin-bottom: 30px;">⏰ Wake Up!</h1>
    <button class="ring-btn snooze-btn" onclick="snoozeAlarm()">Snooze (5 Min)</button>
    <button class="ring-btn stop-btn" onclick="stopAlarm()">Stop</button>
  </div>

  <div id="alarm-modal" class="modal">
    <div class="modal-content">
      <h3 style="color:var(--vanilla-latte)">New Alarm</h3>
      <input type="time" id="alarm-time">
      <select id="alarm-sound">
        <option value="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg">نغمة رقمية</option>
        <option value="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">تنبيه قصير</option>
        <option value="my_tone.mp3">نغمتي الخاصة</option>
        <option value="alarm.mp3">نغمتي الخاصة</option>
      </select>
      <button onclick="addAlarm()" style="width:100%; padding:12px; background:var(--vanilla-latte); border:none; color:#333; font-weight:bold; border-radius:8px;">Add Alarm</button>
      <div class="alarm-list" id="alarm-list"></div>
      <button onclick="toggleModal('alarm-modal')" style="width:100%; background:none; border:none; color:grey; margin-top:15px;">Close</button>
    </div>
  </div>

  <audio id="alarm-audio" loop></audio>

  <script>
    const audio = document.getElementById('alarm-audio');
    let alarms = JSON.parse(localStorage.getItem('alarms') || '[]');
    let currentRingingAlarm = null;

    // رسم الأرقام
    const numbersContainer = document.getElementById('numbers-container');
    for (let i = 1; i <= 12; i++) {
      const num = document.createElement('div');
      num.className = 'hour-num';
      num.innerText = i;
      num.style.transform = `rotate(${i * 30}deg)`;
      numbersContainer.appendChild(num);
    }

    function toggleModal(id) {
      const m = document.getElementById(id);
      m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
      renderAlarms();
    }

    function addAlarm() {
      const time = document.getElementById('alarm-time').value;
      const sound = document.getElementById('alarm-sound').value;
      if (!time) return;
      alarms.push({ id: Date.now(), time, sound, active: true });
      localStorage.setItem('alarms', JSON.stringify(alarms));
      renderAlarms();
    }

    function renderAlarms() {
      const list = document.getElementById('alarm-list');
      list.innerHTML = alarms.map(a => `
        <div class="alarm-item">
          <span>${a.time}</span>
          <button onclick="deleteAlarm(${a.id})" style="color:#ff4444; background:none; border:none;">Delete</button>
        </div>
      `).join('');
    }

    function deleteAlarm(id) {
      alarms = alarms.filter(a => a.id !== id);
      localStorage.setItem('alarms', JSON.stringify(alarms));
      renderAlarms();
    }

    function checkAlarms() {
      const now = new Date();
      const currentTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      
      alarms.forEach(alarm => {
        if (alarm.active && alarm.time === currentTime) {
          triggerAlarm(alarm);
        }
      });
    }

    function triggerAlarm(alarm) {
      currentRingingAlarm = alarm;
      alarm.active = false; 
      audio.src = alarm.sound;
      audio.play();
      document.getElementById('ringing-ui').style.display = 'flex';
    }

    function stopAlarm() {
      audio.pause();
      document.getElementById('ringing-ui').style.display = 'none';
      localStorage.setItem('alarms', JSON.stringify(alarms));
    }

    function snoozeAlarm() {
      audio.pause();
      document.getElementById('ringing-ui').style.display = 'none';
      
      // إضافة 5 دقائق للوقت الحالي
      const now = new Date();
      now.setMinutes(now.getMinutes() + 5);
      const snoozeTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      
      alarms.push({ id: Date.now(), time: snoozeTime, sound: currentRingingAlarm.sound, active: true });
      localStorage.setItem('alarms', JSON.stringify(alarms));
    }

    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();
      document.getElementById('ampm-indicator').innerText = h >= 12 ? 'PM' : 'AM';
      document.getElementById('hour').style.transform = `rotate(${(h % 12) * 30 + m/2}deg)`;
      document.getElementById('minute').style.transform = `rotate(${m * 6}deg)`;
      document.getElementById('second').style.transform = `rotate(${s * 6}deg)`;
      checkAlarms();
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
